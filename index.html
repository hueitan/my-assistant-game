<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Number Guessing Game (MediaWiki API style)</title>
<style>
  :root { --bg:#f9f9f9; --text:#000; --accent:#0066cc; }
  body.dark { --bg:#222; --text:#fff; --accent:#66aaff; }
  body {font-family:Arial,sans-serif; max-width:600px; margin:2rem auto; padding:1rem; background:var(--bg); color:var(--text);}
  h1 {text-align:center;}
  .log {border:1px solid #ccc; padding:.5rem; min-height:150px; background:#fff; overflow:auto; margin-top:1rem;}
  input[type="number"]{width:80px;}
  button{margin-left:.5rem; cursor:pointer;}
  #dark-toggle{position:absolute; top:1rem; right:1rem; background:none; border:none; font-size:1.2rem; color:var(--accent);}
  @media (max-width:480px){body{margin:0.5rem;}}
</style>
</head>
<body>
<button id="dark-toggle">🌙</button>
<h1>Number Guessing Game</h1>
<div id="extract">Loading…</div>
<div>
  <input id="guess" type="number" min="1" max="100" placeholder="1‑100" />
  <button id="go">Guess</button>
  <button id="reset">Reset</button>
  <button id="hint">Hint</button>
</div>
<div class="log" id="log"></div>
<p id="score">Score: 0</p>
<script type="module" src="src/ui.js"></script>
</body>
</html>
